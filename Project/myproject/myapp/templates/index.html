{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">ยินดีต้อนรับสู่ประชากร</h2>
    <table class="table table-hover">
        <thead>
            <tr>
                <th>รหัสประชากร</th>
                <th>ชื่อประชากร</th>
                <th>อายุ</th>
                <th class="text-center">แก้ไข</th>
                <th class="text-center">ลบ</th>
            </tr>
        </thead>
        <tbody>
            {% for person in all_persons %}
            <tr>
                <td>{{ person.id }}</td>
                <td>{{ person.name }}</td>
                <td>{{ person.age }}</td>
                <td class="text-center">
                    <a href="#" class="btn btn-sm" style="background-color: #ff69b4; color: white;">แก้ไข</a>
                </td>
                <td class="text-center">
                    <a href="#" class="btn btn-sm" style="background-color: #ff8c00; color: white;">ลบ</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
